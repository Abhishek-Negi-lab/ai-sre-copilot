groups:
  - name: ai-sre-backend-alerts
    rules:
      - alert: BackendDown
        expr: up{job="ai-sre-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "AI SRE backend is down"
          description: "Prometheus target ai-sre-backend has been down for more than 1 minute."

      - alert: HighHttp5xxErrors
        expr: sum(increase(ai_sre_http_requests_total{job="ai-sre-backend",status_code=~"5.."}[2m])) > 0
        for: 10s
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "HTTP 5xx errors detected"
          description: "Backend returned one or more HTTP 5xx responses in the last 2 minutes."

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum(rate(ai_sre_http_request_duration_seconds_bucket{job="ai-sre-backend"}[5m])) by (le)) > 1
        for: 2m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High backend request latency"
          description: "95th percentile backend request latency is above 1 second."
