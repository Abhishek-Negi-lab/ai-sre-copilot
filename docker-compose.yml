services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_sre_copilot
      POSTGRES_USER: ai_sre_user
      POSTGRES_PASSWORD: ai_sre_password
    volumes:
      -  postgres_data:/var/lib/postgresql/data
      - ./apps/backend/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_sre_user -d ai_sre_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5  

  redis:
    image: redis:7-alpine
    healthcheck: 
       test: ["CMD", "redis-cli", "ping"]
       interval: 10s
       timeout: 5s
       retries: 5   

  backend:
    build:
      context: ./apps/backend
    environment:
       PORT: 5000
       SERVICE_NAME: ai-sre-backend
       APP_VERSION: 1.0.0-compose
       NODE_ENV: production 
       DB_HOST: postgres
       DB_PORT: 5432
       DB_NAME: ai_sre_copilot
       DB_USER: ai_sre_user
       DB_PASSWORD: ai_sre_password
    ports:
      - "5000:5000"
    depends_on:
       postgres:
         condition: service_healthy
       redis:
         condition: service_healthy    

  frontend:
    build: 
      context: ./apps/frontend   
      args: 
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000} 
    ports:
        - "8080:80"
    depends_on:
        -  backend  
volumes:
  postgres_data:
