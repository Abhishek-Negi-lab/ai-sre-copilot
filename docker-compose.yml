services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_sre_copilot
      POSTGRES_USER: ai_sre_user
      POSTGRES_PASSWORD: ai_sre_password
    volumes:
      -  postgres_data:/var/lib/postgresql/data
      - ./apps/backend/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_sre_user -d ai_sre_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5  

  redis:
    image: redis:7-alpine
    healthcheck: 
       test: ["CMD", "redis-cli", "ping"]
       interval: 10s
       timeout: 5s
       retries: 5   

  backend:
    build:
      context: ./apps/backend
    environment:
       PORT: 5000
       SERVICE_NAME: ai-sre-backend
       APP_VERSION: 1.0.0-compose
       NODE_ENV: production 
       DB_HOST: postgres
       DB_PORT: 5432
       DB_NAME: ai_sre_copilot
       DB_USER: ai_sre_user
       DB_PASSWORD: ai_sre_password
    ports:
      - "5000:5000"
    depends_on:
       postgres:
         condition: service_healthy
       redis:
         condition: service_healthy    

  frontend:
    build: 
      context: ./apps/frontend   
      args: 
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000} 
    ports:
        - "8080:80"
    depends_on:
        -  backend  
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus


  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"


volumes:
  postgres_data:
